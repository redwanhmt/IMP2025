<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Institut Médical Privé</title>

  <!-- Font Awesome للأيقونات -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #007bff, #00d4a5);
      color: white;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo img {
      width: 300px; /* كبرنا الحجم */
      max-width: 95%;
      margin-bottom: 30px;
      animation: fadeIn 1.2s ease;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      width: 100%;
      max-width: 320px;
      border: none;
      border-radius: 14px;
      background-color: #25D366;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
      animation: slideUp 0.8s ease forwards;
    }

    .btn-whatsapp i {
      margin-right: 12px;
      font-size: 20px;
    }

    .btn-whatsapp:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .btn-whatsapp:active {
      transform: scale(0.97);
    }

    .powered {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media screen and (max-width: 480px) {
      .logo img { width: 220px; } /* على الموبايل يكون أصغر */
      h2 { font-size: 18px; }
      .btn-whatsapp { font-size: 16px; padding: 14px 20px; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo-imp.png" alt="Logo IMP" />
  </div>

  <h2>Contactez-nous sur WhatsApp</h2>

  <a href="https://wa.me/212639792208" class="btn-whatsapp">
    <i class="fab fa-whatsapp"></i> WhatsApp
  </a>

  <div class="powered">Conçu par IMP 2026</div>

</body>
</html>
